!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIVALLY - Instant Buy Box Analyzer by SAKORP</title>

<style>
:root {
    --primary-color: #007bff;
    --text-dark: #1a1a1a;
    --text-light: #6c757d;
    --bg-page: #f8f9fa;
    --bg-card: #ffffff;
    --border-color: #e1e4e8;
    --shadow: 0 10px 30px rgba(0,0,0,0.05);
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    background-color: var(--bg-page);
    margin: 0;
}

header {
    background: white;
    padding: 15px 50px;
    border-bottom: 1px solid var(--border-color);
    display: flex;
    justify-content: space-between;
}

.brand-logo {
    font-size: 24px;
    font-weight: 800;
}
.brand-logo span { color: var(--primary-color); }

.main {
    max-width: 550px;
    margin: 80px auto;
    background: white;
    padding: 40px;
    border-radius: 16px;
    box-shadow: var(--shadow);
}

input {
    width: 100%;
    padding: 14px;
    margin-bottom: 15px;
}

button {
    width: 100%;
    padding: 16px;
    background: var(--primary-color);
    color: white;
    border: none;
    border-radius: 8px;
}

#result-box {
    margin-top: 30px;
    display: none;
}

.diagnosis-card {
    padding: 20px;
    border-radius: 12px;
}

.HIGH { background:#ffe5e5; }
.MEDIUM { background:#fff5cc; }
.LOW { background:#e6ffe6; }

</style>
</head>

<body>

<header>
<div class="brand-logo">RIVALLY<span>.</span></div>
<div>Powered by SAKORP</div>
</header>

<div class="main">

<h2>Instant Buy Box Analyzer</h2>

<input id="asin" placeholder="ASIN">
<input id="seller_id" placeholder="Seller ID">

<button onclick="checkBuyBox()" id="btn">Analyze</button>

<div id="result-box">
    <div id="diagnosis" class="diagnosis-card">
        <h3 id="headline"></h3>
        <p id="details"></p>
    </div>
</div>

</div>

<script>
async function checkBuyBox() {

    const asin = document.getElementById("asin").value.trim();
    const sellerId = document.getElementById("seller_id").value.trim();
    const btn = document.getElementById("btn");

    if (!asin || !sellerId) {
        alert("Enter ASIN and Seller ID");
        return;
    }

    btn.innerText = "Analyzing...";
    btn.disabled = true;

    try {

        const res = await fetch(`/api?asin=${asin}&seller_id=${sellerId}`);
        const data = await res.json();

        const product = data.product || {};
        const buybox = product.buybox_winner || {};

        const winnerId =
            buybox?.seller?.id ||
            buybox?.merchant_info?.id ||
            buybox?.fulfillment?.third_party_seller?.id || "";

        const sellers =
            buybox?.mixed_offers_count ||
            product?.mixed_offers_count ||
            product?.offers_count ||
            1;

        let level = "LOW";
        let headline = "";
        let details = "";

        if (sellerId !== winnerId) {
            level = "HIGH";
            headline = "🚨 You are NOT winning the Buy Box";
            details = "Another seller is taking your sales right now.";
        } else {
            if (sellers > 10) {
                level = "HIGH";
                headline = "⚠️ High Risk";
                details = `${sellers} sellers detected. You can lose Buy Box anytime.`;
            } else if (sellers > 5) {
                level = "MEDIUM";
                headline = "⚡ Medium Risk";
                details = `${sellers} competitors detected. Monitor pricing closely.`;
            } else {
                level = "LOW";
                headline = "✅ Buy Box Stable";
                details = "Low competition. You are safe for now.";
            }
        }

        document.getElementById("headline").innerText = headline;
        document.getElementById("details").innerText = details;

        const box = document.getElementById("diagnosis");
        box.className = "diagnosis-card " + level;

        document.getElementById("result-box").style.display = "block";

    } catch(e) {
        alert("Error fetching data");
    }

    btn.innerText = "Analyze";
    btn.disabled = false;
}
</script>

</body>
</html>
