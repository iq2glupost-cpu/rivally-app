<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIVALLY - Instant Buy Box Analyzer</title>

<style>
:root {
    --primary-color: #007bff;
    --text-dark: #1a1a1a;
    --text-light: #6c757d;
    --bg-page: #f8f9fa;
    --bg-card: #ffffff;
    --border-color: #e1e4e8;
    --shadow: 0 10px 30px rgba(0,0,0,0.05);
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    background: var(--bg-page);
    margin:0;
}

.main {
    max-width:600px;
    margin:80px auto;
    background:#fff;
    padding:40px;
    border-radius:16px;
    box-shadow:var(--shadow);
}

input, button {
    width:100%;
    padding:14px;
    margin:10px 0;
}

button {
    background:#007bff;
    color:white;
    border:none;
    border-radius:8px;
}

.diagnosis-card {
    margin-top:20px;
    padding:20px;
    border-radius:10px;
}

.HIGH { background:#ffe5e5; }
.MEDIUM { background:#fff5cc; }
.LOW { background:#e6ffe6; }

</style>
</head>

<body>

<div class="main">

<h2>Buy Box Analyzer</h2>

<input id="asin" placeholder="ASIN">
<input id="seller_id" placeholder="Seller ID">

<button onclick="check()">Analyze</button>

<div id="result"></div>

</div>

<script>
async function check() {

    const asin = document.getElementById("asin").value;
    const seller = document.getElementById("seller_id").value;
    const result = document.getElementById("result");

    result.innerHTML = "Analyzing...";

    try {
        const res = await fetch(`/api?asin=${asin}&seller_id=${seller}`);
        const data = await res.json();

        const product = data.product;
        const buybox = product.buybox_winner || {};

        const winnerId =
            buybox?.seller?.id ||
            buybox?.merchant_info?.id ||
            buybox?.fulfillment?.third_party_seller?.id || "";

        const sellers =
            buybox?.mixed_offers_count ||
            product?.mixed_offers_count ||
            1;

        let headline = "";
        let details = "";
        let level = "LOW";

        if (seller !== winnerId) {
            level = "HIGH";
            headline = "🚨 You are NOT winning the Buy Box";
            details = "Another seller is taking your sales right now.";
        } else {
            if (sellers > 10) {
                level = "HIGH";
                headline = "⚠️ High Risk";
                details = `${sellers} sellers detected. You can lose Buy Box ANY moment.`;
            } else if (sellers > 5) {
                level = "MEDIUM";
                headline = "⚡ Medium Risk";
                details = `${sellers} competitors. Monitor pricing closely.`;
            } else {
                level = "LOW";
                headline = "✅ Buy Box Stable";
                details = "Low competition. You are safe for now.";
            }
        }

        result.className = "diagnosis-card " + level;
        result.innerHTML = `<h3>${headline}</h3><p>${details}</p>`;

    } catch(e) {
        result.innerHTML = "Error fetching data";
    }
}
</script>

</body>
</html>
