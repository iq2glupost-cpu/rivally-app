<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIVALLY - Instant Buy Box Analyzer by SAKORP</title>
    <style>
        :root {
            --primary-color: #007bff;
            --text-dark: #1a1a1a;
            --text-light: #6c757d;
            --bg-page: #f8f9fa;
            --bg-card: #ffffff;
            --border-color: #e1e4e8;
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-page);
            margin: 0;
            padding: 0;
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: var(--bg-card);
            padding: 15px 50px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-logo { font-size: 24px; font-weight: 800; color: var(--text-dark); text-decoration: none; }
        .brand-logo span { color: var(--primary-color); }
        .powered-by { font-size: 12px; color: var(--text-light); }

        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 50px 20px;
        }

        .analyzer-container {
            max-width: 550px;
            width: 100%;
            background: var(--bg-card);
            padding: 40px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            border: 1px solid #f0f0f0;
        }

        h1 { text-align: center; font-size: 28px; margin-bottom: 10px; }
        .subtitle { text-align: center; color: var(--text-light); margin-bottom: 30px; }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
        input { width: 100%; padding: 14px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 16px; }
        
        button {
            width: 100%;
            padding: 16px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 700;
        }

        button:disabled { background-color: #a0cfff; cursor: wait; }

        #result-box { margin-top: 30px; display: none; border-top: 2px solid var(--border-color); padding-top: 30px; }
        
        .diagnosis-card { padding: 25px; border-radius: 12px; margin-bottom: 30px; border: 1px solid #e1e4e8; }
        .LOW { background-color: #f5fff6; border-color: #c3e6cb; color: #155724; }
        .HIGH { background-color: #fff5f5; border-color: #ffcccc; color: #cc0000; }

        .headline { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .details { font-size: 14px; line-height: 1.5; }

        .upsell-banner {
            background-color: #111111;
            color: #ffffff;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            border: 2px solid var(--primary-color);
        }

        footer { text-align: center; padding: 20px; color: var(--text-light); font-size: 13px; }
    </style>
</head>
<body>

<header>
    <a href="/" class="brand-logo">RIVALLY<span>.</span></a>
    <div class="powered-by">Powered by <strong>SAKORP</strong></div>
</header>

<div class="main-content">
    <div class="analyzer-container">
        <h1>Instant Buy Box Threat Analyzer</h1>
        <p class="subtitle">Unesite ASIN da proverite stanje vašeg Amazon listinga.</p>
       
        <div class="form-group">
            <label>Product ASIN</label>
            <input type="text" id="asin" placeholder="npr. B08N5WRWNW">
        </div>
        <div class="form-group" style="display:none;"> <label>Seller ID</label>
            <input type="text" id="seller_id" value="SAKORP_USER">
        </div>

        <button onclick="checkBuyBox()" id="submitBtn">Analyze My Listing Now</button>

        <div id="result-box">
            <div id="diagnosis" class="diagnosis-card LOW">
                <div id="diag-headline" class="headline">Analiza završena!</div>
                <div id="diag-details" class="details"></div>
            </div>

            <div class="upsell-banner">
                <p>Želite 24/7 zaštitu od hijackera?</p>
                <a href="https://sakorp.com" target="_blank" style="color: #007bff; font-weight: bold; text-decoration: none;">Saznajte više o SAKORP Shield-u →</a>
            </div>
        </div>
    </div>
</div>

<footer>
    &copy; 2026 SAKORP. Sva prava zadržana. RIVALLY je vlasništvo kompanije SAKORP Corporation.
</footer>

<script>
    async function checkBuyBox() {
        const asinInput = document.getElementById('asin').value.trim();
        const btn = document.getElementById('submitBtn');
        const resultBox = document.getElementById('result-box');
        const diagHeadline = document.getElementById('diag-headline');
        const diagDetails = document.getElementById('diag-details');

        if (!asinInput) {
            alert("Molimo unesite ASIN proizvoda.");
            return;
        }

        // 1. Priprema i animacija dugmeta dok čekamo Rainforest
        btn.disabled = true;
        resultBox.style.display = 'none';
        
        let seconds = 0;
        const loadingInterval = setInterval(() => {
            seconds++;
            if (seconds < 5) btn.innerText = "Povezivanje sa Amazon serverima...";
            else if (seconds < 10) btn.innerText = "Izvlačenje cena i Buy Box stanja...";
            else if (seconds < 15) btn.innerText = "Skoro gotovo, analiziramo pretnje...";
            else btn.innerText = "Još samo trenutak...";
        }, 1000);

        try {
            // 2. Pozivamo naš Vercel API
            // Dodajemo ASIN kao parametar u linku
            const response = await fetch(`/api?asin=${asinInput}`);

            if (!response.ok) throw new Error("Serveru treba previše vremena ili je ključ neispravan.");

            const data = await response.json();

            // 3. Prikazujemo dobijene podatke
            if (data && data.product) {
                diagHeadline.innerText = data.product.title;
                
                const price = data.product.buybox_winner ? 
                    `${data.product.buybox_winner.price.value} ${data.product.buybox_winner.price.currency}` : 
                    "Nema cene";
                
                diagDetails.innerText = `Proizvod je uspešno lociran. Trenutna Buy Box cena: ${price}. Stanje listinga je stabilno.`;
                
                resultBox.style.display = 'block';
                window.scrollTo({ top: resultBox.offsetTop, behavior: 'smooth' });
            } else {
                alert("Nismo našli proizvod za taj ASIN. Proverite da li je ispravan.");
            }

        } catch (error) {
            console.error(error);
            alert("Veza je pukla jer Rainforest API-ju treba više od 15-20 sekundi. Proverite konzolu za detalje.");
        } finally {
            clearInterval(loadingInterval);
            btn.innerText = "Analyze My Listing Now";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
